services:
  # Phase 2 використовує SQLite (один файл, без БД-контейнера).
  # Postgres-сервіс може бути повернутий пізніше, якщо обсяг даних чи
  # multi-instance deploy цього потребуватиме — провайдер EF Core
  # перемикається через UseSqlite() ↔ UseNpgsql() + перегенерація міграцій.

  scraper:
    build:
      context: ..
      dockerfile: docker/Dockerfile.scraper
    env_file: ../.env
    volumes:
      - rr_data:/app/data
    restart: unless-stopped

  telegram-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bot
    env_file: ../.env
    volumes:
      - rr_data:/app/data
    restart: unless-stopped

  # MCP server runs locally with Claude Desktop, NOT in docker
  # (it communicates via stdio with the desktop client)

  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: Y
    ports:
      - "5341:80"
    volumes:
      - seq_data:/data

volumes:
  rr_data:   # shared SQLite file between scraper and bot containers
  seq_data:
