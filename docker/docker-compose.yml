services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  scraper:
    build:
      context: ..
      dockerfile: docker/Dockerfile.scraper
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  telegram-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bot
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # MCP server runs locally with Claude Desktop, NOT in docker
  # (it communicates via stdio with the desktop client)

  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: Y
    ports:
      - "5341:80"
    volumes:
      - seq_data:/data

volumes:
  pg_data:
  seq_data:
